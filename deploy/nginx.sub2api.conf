# Example Nginx reverse proxy for Sub2API/Codex.
#
# The public 413 in the Codex long-task failure is usually generated before
# Sub2API sees the request when this value is missing. Nginx defaults to 1m.

log_format sub2api_json escape=json
  '{'
  '"time":"$time_iso8601",'
  '"remote_addr":"$remote_addr",'
  '"method":"$request_method",'
  '"uri":"$request_uri",'
  '"status":$status,'
  '"request_length":$request_length,'
  '"content_length":"$http_content_length",'
  '"request_time":$request_time,'
  '"upstream_status":"$upstream_status",'
  '"upstream_response_time":"$upstream_response_time",'
  '"request_id":"$request_id",'
  '"cf_ray":"$http_cf_ray"'
  '}';

server {
  listen 443 ssl http2;
  server_name api.sub2api.com;

# Keep this at or above your actual deployment limit. Do not lower an existing 500M setup.
  client_max_body_size 500m;
  client_body_buffer_size 1m;

  access_log /var/log/nginx/sub2api.access.log sub2api_json;
  error_log /var/log/nginx/sub2api.error.log warn;

  underscores_in_headers on;

  error_page 413 = @sub2api_payload_too_large;

  location @sub2api_payload_too_large {
    add_header X-Sub2API-413-Layer nginx always;
    add_header X-Sub2API-Body-Limit 500m always;
    default_type application/json;
    return 413 '{"error":{"type":"payload_too_large","message":"Request body too large at nginx","layer":"nginx","limit":"500m"}}';
  }

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;

    proxy_request_buffering on;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;
  }
}
